services:
  backend:
    build: ./backend
    volumes:
      - nachschreiber_data:/data
    environment:
      - DATA_DIR=/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3002:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  nachschreiber_data:
